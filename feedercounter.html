<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Feeder">
    <title>Feeder Counter</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0a0a0f;
            --surface: #13131a;
            --border:  rgba(255,255,255,0.08);
            --accent:  #4fc3f7;
            --accent2: #ff8a65;
            --green:   #69f0ae;
            --text:    #e8eaf6;
            --muted:   #7986cb;
        }

        html, body {
            height: 100%; background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; user-select: none; -webkit-user-select: none;
        }

        body {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: env(safe-area-inset-top,20px) 24px env(safe-area-inset-bottom,20px);
            min-height: 100dvh; gap: 0;
        }

        .header { text-align: center; margin-bottom: 28px; }
        .header h1 {
            font-size: 1.05rem; font-weight: 600;
            letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
        }

        /* ── Ring clock ── */
        .clock-ring {
            position: relative;
            width: min(68vw, 260px); height: min(68vw, 260px);
            margin-bottom: 22px; flex-shrink: 0;
        }
        .clock-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .ring-bg   { fill: none; stroke: var(--surface); stroke-width: 12; }
        .ring-fill { fill: none; stroke-width: 12; stroke-linecap: round;
                     transition: stroke-dashoffset 1s linear, stroke 0.4s; }
        .clock-inner {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 4px;
        }
        .time-display {
            font-size: clamp(2.6rem,11vw,4rem); font-weight: 700;
            letter-spacing: -0.02em; font-variant-numeric: tabular-nums; line-height: 1;
        }
        .phase-label {
            font-size: 0.7rem; font-weight: 500;
            letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
        }

        /* ── Status row ── */
        .status-row {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 28px; font-size: 0.8rem; color: var(--muted); min-height: 20px;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--muted); transition: background 0.3s; flex-shrink: 0;
        }
        .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }

        /* ── Background mode badge ── */
        .bg-badge {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 0.68rem; padding: 4px 10px; border-radius: 20px;
            border: 1px solid var(--border); color: var(--muted);
            margin-bottom: 16px; transition: all 0.3s;
        }
        .bg-badge.sw-ok   { border-color: rgba(105,240,174,0.4); color: var(--green); }
        .bg-badge.sw-warn { border-color: rgba(255,193,7,0.4);   color: #ffd54f; }
        .bg-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

        /* ── Counter chips ── */
        .counters { display: flex; gap: 14px; margin-bottom: 28px; }
        .chip {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 10px 18px; text-align: center; min-width: 78px;
        }
        .chip-val  { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; }
        .chip-lbl  { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.08em;
                     text-transform: uppercase; margin-top: 2px; }

        /* ── Buttons ── */
        .btn-main {
            width: min(68vw, 260px); padding: 17px; border: none; border-radius: 18px;
            font-size: 1rem; font-weight: 700; letter-spacing: 0.04em;
            cursor: pointer; transition: transform 0.12s, opacity 0.12s;
            -webkit-tap-highlight-color: transparent; margin-bottom: 10px;
        }
        .btn-main:active { transform: scale(0.96); opacity: 0.85; }
        .btn-start { background: linear-gradient(135deg,#4fc3f7,#1976d2); color:#fff; }
        .btn-stop  { background: linear-gradient(135deg,#ef5350,#b71c1c); color:#fff; }

        .btn-notify {
            width: min(68vw, 260px); padding: 13px; border-radius: 14px;
            border: 1.5px solid var(--accent); background: transparent; color: var(--accent);
            font-size: 0.88rem; font-weight: 600; cursor: pointer;
            transition: background 0.2s, transform 0.12s;
            -webkit-tap-highlight-color: transparent; margin-bottom: 10px;
        }
        .btn-notify:active  { transform: scale(0.96); }
        .btn-notify.granted { border-color: var(--green); color: var(--green); pointer-events: none; }
        .btn-notify.denied  { border-color: #ef5350; color: #ef5350; pointer-events: none; }

        /* ── Info ── */
        .info {
            margin-top: 14px; font-size: 0.7rem; color: var(--muted);
            text-align: center; line-height: 1.55; max-width: 290px;
        }
        .info strong { color: var(--text); }

        /* ── Flash overlay ── */
        .flash {
            position: fixed; inset: 0;
            background: rgba(255,138,101,0.18);
            pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 99;
        }
        .flash.show { opacity: 1; }
    </style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="header"><h1>Feeder Counter</h1></div>

<div class="clock-ring">
    <svg viewBox="0 0 100 100">
        <circle class="ring-bg"   cx="50" cy="50" r="44"/>
        <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="44"
                stroke-dasharray="276.46" stroke-dashoffset="0" stroke="#4fc3f7"/>
    </svg>
    <div class="clock-inner">
        <div class="time-display" id="timeDisplay">15:00</div>
        <div class="phase-label"  id="phaseLabel">Bereit</div>
    </div>
</div>

<div class="status-row">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Tippe Start um zu beginnen</span>
</div>

<div class="bg-badge sw-warn" id="bgBadge">
    <span class="dot"></span><span id="bgBadgeText">Hintergrund: wird geladen…</span>
</div>

<div class="counters">
    <div class="chip"><div class="chip-val" id="alarmCount">0</div><div class="chip-lbl">Alarme</div></div>
    <div class="chip"><div class="chip-val" id="remCount">0</div><div class="chip-lbl">Erinnerungen</div></div>
</div>

<button class="btn-notify" id="btnNotify" onclick="requestNotify()">🔔 Benachrichtigungen erlauben</button>
<button class="btn-main btn-start" id="btnMain" onclick="toggleTimer()">▶ Start</button>

<div class="info" id="infoText">
    Für Apple Watch: Benachrichtigungen erlauben &amp; Uhr verbunden lassen.<br>
    Für 100% Hintergrund: Seite zum <strong>Home Screen hinzufügen</strong>.
</div>

<script>
// ── Config ────────────────────────────────────────────────────
const ALARM_MS  = 15 * 60 * 1000;
const REMIND_MS =  2 * 60 * 1000;
const RING_CIRC = 276.46;

// ── State ─────────────────────────────────────────────────────
let running       = false;
let phase         = 'alarm';      // 'alarm' | 'reminder'
let nextEventTime = 0;            // absolute epoch ms
let phaseDuration = ALARM_MS;
let alarmIdx      = 0;
let alarmCount    = 0;
let remCount      = 0;
let tickId        = null;
let wakeLock      = null;
let audioCtx      = null;
let noSleepOsc    = null;
let swReg         = null;

// ── DOM ──────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const timeDisplay = $('timeDisplay');
const phaseLabel  = $('phaseLabel');
const statusDot   = $('statusDot');
const statusText  = $('statusText');
const btnMain     = $('btnMain');
const btnNotify   = $('btnNotify');
const ringFill    = $('ringFill');
const alarmEl     = $('alarmCount');
const remEl       = $('remCount');
const flash       = $('flash');
const bgBadge     = $('bgBadge');
const bgBadgeText = $('bgBadgeText');

// ── Service Worker ────────────────────────────────────────────
async function initSW() {
    if (!('serviceWorker' in navigator)) {
        setBgBadge(false, 'Hintergrund: nicht verfügbar');
        return;
    }
    try {
        swReg = await navigator.serviceWorker.register('/feedercounter-sw.js', { scope: '/' });
        setBgBadge(true, 'Hintergrund: aktiv');

        navigator.serviceWorker.addEventListener('message', onSWMessage);
    } catch (e) {
        setBgBadge(false, 'Hintergrund: eingeschränkt');
    }
}

function onSWMessage(e) {
    const { type, phase: firedPhase, index } = e.data || {};
    if (type !== 'SW_FIRED') return;

    // SW fired an event while page was in background — advance state
    if (!running) return;

    if (firedPhase === 'alarm') {
        alarmCount++;
        alarmEl.textContent = alarmCount;
        advancePhase('alarm');
    } else {
        remCount++;
        remEl.textContent = remCount;
        advancePhase('reminder');
    }
    updateDisplay();
    scheduleViaSW();
    triggerFlash();
}

async function scheduleViaSW() {
    if (!swReg) return;
    const active = swReg.active || (await navigator.serviceWorker.ready).active;
    if (!active) return;
    active.postMessage({
        type:   'SCHEDULE',
        fireAt: nextEventTime,
        phase,
        index:  alarmIdx
    });
}

async function cancelSW() {
    if (!swReg) return;
    const active = swReg.active || (swReg.installing) || null;
    if (active) active.postMessage({ type: 'STOP' });
}

function setBgBadge(ok, text) {
    bgBadgeText.textContent = text;
    bgBadge.classList.toggle('sw-ok',   ok);
    bgBadge.classList.toggle('sw-warn', !ok);
}

// ── Notification ──────────────────────────────────────────────
async function requestNotify() {
    if (!('Notification' in window)) { updateNotifyBtn('denied'); return; }
    const r = await Notification.requestPermission();
    updateNotifyBtn(r);
}

function updateNotifyBtn(state) {
    const s = state || (('Notification' in window) ? Notification.permission : 'denied');
    if (s === 'granted') {
        btnNotify.textContent = '✅ Benachrichtigungen aktiv';
        btnNotify.className = 'btn-notify granted';
    } else if (s === 'denied') {
        btnNotify.textContent = '🚫 In Einstellungen erlauben';
        btnNotify.className = 'btn-notify denied';
    }
}

// ── NoSleep: silent oscillator keeps audio session alive ──────
function startNoSleep() {
    try {
        audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
        audioCtx.resume();
        noSleepOsc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        noSleepOsc.frequency.value = 0.1;  // 0.1 Hz – completely sub-audible
        gain.gain.value            = 0.001; // near silence but keeps iOS audio session alive
        noSleepOsc.connect(gain);
        gain.connect(audioCtx.destination);
        noSleepOsc.start(0);
    } catch (e) {}
}

function stopNoSleep() {
    try { noSleepOsc?.stop();    noSleepOsc = null; } catch (e) {}
    try { audioCtx?.close();     audioCtx   = null; } catch (e) {}
}

// ── Wake Lock ─────────────────────────────────────────────────
async function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch (e) {}
}
async function releaseWakeLock() {
    if (wakeLock) { try { await wakeLock.release(); } catch(e) {} wakeLock = null; }
}

// Re-acquire wake lock when page becomes visible
document.addEventListener('visibilitychange', async () => {
    if (document.hidden || !running) return;
    if (!wakeLock) await acquireWakeLock();
    // Catch up any missed ticks immediately
    processTick();
});

// ── Timer ─────────────────────────────────────────────────────
function toggleTimer() {
    running ? stopTimer() : startTimer();
}

async function startTimer() {
    running       = true;
    phase         = 'alarm';
    alarmIdx      = 1;
    alarmCount    = 0;
    remCount      = 0;
    phaseDuration = ALARM_MS;
    nextEventTime = Date.now() + ALARM_MS;

    alarmEl.textContent = '0';
    remEl.textContent   = '0';
    ringFill.style.stroke = 'var(--accent)';
    phaseLabel.textContent = 'Alarm in…';
    btnMain.textContent    = '■ Stop';
    btnMain.className      = 'btn-main btn-stop';
    statusDot.classList.add('active');
    setStatus('Läuft – Alarm in 15 Min');

    startNoSleep();
    await acquireWakeLock();
    scheduleViaSW();

    tickId = setInterval(processTick, 500);
    updateDisplay();
}

function stopTimer() {
    running = false;
    clearInterval(tickId); tickId = null;
    stopNoSleep();
    releaseWakeLock();
    cancelSW();

    btnMain.textContent    = '▶ Start';
    btnMain.className      = 'btn-main btn-start';
    statusDot.classList.remove('active');
    phaseLabel.textContent = 'Bereit';
    timeDisplay.textContent = '15:00';
    ringFill.style.strokeDashoffset = '0';
    ringFill.style.stroke = 'var(--accent)';
    setStatus('Gestoppt');
}

// ── Tick: uses absolute timestamps so drift/suspension is caught ──
function processTick() {
    const now = Date.now();
    // Fire all events that passed since last tick (handles long suspensions)
    while (running && nextEventTime && now >= nextEventTime) {
        const firedPhase = phase;

        if (firedPhase === 'alarm') {
            alarmCount++;
            alarmEl.textContent = alarmCount;
            fireAlarm(`⏰ Feeder Alarm`, `Alarm #${alarmIdx} – Zeit zu handeln!`);
        } else {
            remCount++;
            remEl.textContent = remCount;
            fireAlarm(`🔔 Erinnerung`, `Hast du Alarm #${alarmIdx} gesehen?`);
        }

        advancePhase(firedPhase);
        scheduleViaSW();
        triggerFlash();
    }
    updateDisplay();
}

function advancePhase(firedPhase) {
    if (firedPhase === 'alarm') {
        phase         = 'reminder';
        phaseDuration = REMIND_MS;
        nextEventTime += REMIND_MS;
        phaseLabel.textContent = 'Erinnerung in…';
        ringFill.style.stroke  = 'var(--accent2)';
        setStatus(`Alarm #${alarmIdx} ausgelöst – Erinnerung in 2 Min`);
    } else {
        alarmIdx++;
        phase         = 'alarm';
        phaseDuration = ALARM_MS;
        nextEventTime += ALARM_MS;
        phaseLabel.textContent = 'Alarm in…';
        ringFill.style.stroke  = 'var(--accent)';
        setStatus(`Nächster Alarm in 15 Min (Runde ${alarmIdx})`);
    }
}

// ── Alarm delivery ────────────────────────────────────────────
function fireAlarm(title, body) {
    if (navigator.vibrate) navigator.vibrate([400,200,400,200,600]);
    if ('Notification' in window && Notification.permission === 'granted') {
        try {
            new Notification(title, { body, requireInteraction: true, tag: 'feeder', renotify: true });
        } catch (e) {}
    }
    playBeep();
}

function playBeep() {
    try {
        const ctx  = new (window.AudioContext || window.webkitAudioContext)();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.9);
        setTimeout(() => ctx.close(), 1400);
    } catch (e) {}
}

// ── Display ───────────────────────────────────────────────────
function updateDisplay() {
    const ms  = Math.max(0, nextEventTime - Date.now());
    const min = Math.floor(ms / 60000);
    const sec = Math.floor((ms % 60000) / 1000);
    timeDisplay.textContent = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    const progress = running ? 1 - ms / phaseDuration : 0;
    ringFill.style.strokeDashoffset = String(RING_CIRC * (1 - Math.max(0, Math.min(1, progress))));
}

function triggerFlash() {
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 400);
}

function setStatus(text) { statusText.textContent = text; }

// ── Init ──────────────────────────────────────────────────────
updateNotifyBtn();
initSW();

if (window.navigator.standalone === false) {
    $('infoText').innerHTML =
        '⬆️ Tippe <strong>Teilen → Zum Home-Bildschirm</strong> für zuverlässigen Hintergrund-Betrieb.<br>' +
        'Dann Benachrichtigungen erlauben → Apple Watch bekommt alle Alarme.';
}
</script>
</body>
</html>
